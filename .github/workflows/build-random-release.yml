name: Build Random Release

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build
        run: ./gradlew build --no-daemon

      - name: Collect release jars
        run: |
          mkdir -p dist
          find build/libs -maxdepth 1 -type f -name "*.jar" ! -name "*-sources.jar" -exec cp {} dist/ \;
          ls -la dist

      - name: Generate random release metadata
        id: random
        run: |
          random_id="$(openssl rand -hex 12)"
          echo "tag=release-${random_id}" >> "$GITHUB_OUTPUT"
          echo "title=release-${random_id}" >> "$GITHUB_OUTPUT"

      - name: Publish random release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.random.outputs.tag }}
          name: ${{ steps.random.outputs.title }}
          body: |
            Automated build from commit ${{ github.sha }}.
            Release tag and title are generated randomly by GitHub Actions.
          files: dist/*.jar
          fail_on_unmatched_files: true
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
